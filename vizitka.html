<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Станкина Марина</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: rgba(255,255,255,0.06);
      --accent1: #a259ff;
      --accent2: #ff6b6b;
      --accent3: #4ecdc4;
      --text: #e8e8e8;
      --muted: #888;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--accent1);
      top: -100px; left: -100px;
      animation: orb1 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--accent3);
      bottom: -80px; right: -80px;
      animation: orb2 15s ease-in-out infinite alternate;
    }

    @keyframes orb1 { to { transform: translate(60px, 80px) scale(1.1); } }
    @keyframes orb2 { to { transform: translate(-60px, -60px) scale(1.15); } }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: min(420px, 94vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px 44px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(162,89,255,0.08),
        0 32px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(162,89,255,0.06);
      animation: cardIn 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Thin gradient top border */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 28px;
      padding: 1px;
      background: linear-gradient(135deg, var(--accent1), var(--accent3), var(--accent2));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
      pointer-events: none;
    }

    /* Avatar */
    .avatar-wrap {
      width: 88px; height: 88px;
      margin: 0 auto 28px;
      position: relative;
    }
    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--accent1), var(--accent3), var(--accent2), var(--accent1));
      animation: spin 6s linear infinite;
      opacity: 0.85;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar {
      position: relative;
      width: 88px; height: 88px;
      border-radius: 50%;
      background: var(--bg);
      border: 3px solid var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 1;
    }
    .avatar svg { width: 52px; height: 52px; }

    /* Name */
    .name {
      font-size: clamp(1.7rem, 6vw, 2.1rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.15;
      background: linear-gradient(120deg, #fff 30%, var(--accent1) 60%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(162,89,255,0.45));
      margin-bottom: 10px;
    }

    /* Specialization */
    .spec {
      font-size: 0.93rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      line-height: 1.5;
      margin-bottom: 32px;
      padding: 0 4px;
    }
    .spec strong {
      display: block;
      font-size: 1rem;
      color: var(--text);
      font-weight: 500;
      margin-top: 2px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);
      margin-bottom: 28px;
    }

    /* Social icons */
    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px; height: 52px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--muted);
      transition: transform 0.22s ease, background 0.22s ease, color 0.22s ease, box-shadow 0.22s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .social-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      border-radius: inherit;
      transition: opacity 0.22s;
    }
    .social-btn:hover {
      transform: translateY(-4px) scale(1.08);
      color: #fff;
    }

    .social-btn.tg:hover  { background: rgba(39,153,222,0.18); box-shadow: 0 8px 24px rgba(39,153,222,0.25); }
    .social-btn.wa:hover  { background: rgba(37,211,102,0.18); box-shadow: 0 8px 24px rgba(37,211,102,0.25); }

    .social-btn svg { width: 24px; height: 24px; flex-shrink: 0; }

    /* Tooltip */
    .social-btn[data-tip]::before {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(20,20,20,0.95);
      color: #fff;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
    }
    .social-btn:hover::before {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* CTA Button */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      justify-content: center;
      padding: 15px 28px;
      border-radius: 16px;
      background: linear-gradient(120deg, var(--accent1), #7c3aed);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-decoration: none;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 20px rgba(162,89,255,0.35);
    }
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(162,89,255,0.55);
    }
    .cta:hover::before { transform: translateX(100%); }
    .cta:active { transform: translateY(0) scale(0.98); }

    .cta svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* Tagline */
    .tagline {
      margin-top: 20px;
      font-size: 0.78rem;
      color: #444;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    @media (max-width: 400px) {
      .card { padding: 36px 24px 32px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Avatar -->
  <div class="avatar-wrap">
    <div class="avatar-ring"></div>
    <div class="avatar">
      <!-- Person SVG icon -->
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="18" r="9" fill="url(#av1)"/>
        <path d="M6 46c0-11.046 8.954-20 20-20s20 8.954 20 20" stroke="url(#av2)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <defs>
          <linearGradient id="av1" x1="17" y1="9" x2="35" y2="27" gradientUnits="userSpaceOnUse">
            <stop stop-color="#a259ff"/>
            <stop offset="1" stop-color="#4ecdc4"/>
          </linearGradient>
          <linearGradient id="av2" x1="6" y1="26" x2="46" y2="46" gradientUnits="userSpaceOnUse">
            <stop stop-color="#a259ff"/>
            <stop offset="1" stop-color="#4ecdc4"/>

        </defs>

  <div class="spec">

</div>

</body>
</html>
